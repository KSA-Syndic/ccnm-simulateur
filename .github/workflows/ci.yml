# CI — lint, build, Vitest, Playwright (Vue on 5173 via Playwright webServer).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_BASE: /
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm run test:run

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        env:
          CI: 'true'
        run: npm run e2e
